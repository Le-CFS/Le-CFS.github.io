une:
  nom: Activités à la Une
  images:
  - name: Psycho Mouv
    titre_overlay: Psycho Mouv
    img: "/assets/images/psycho-mouv.png"
    bouton: Plus d'info
    nouveau: oui
    infos: ''
    description: |-
      Votre petit bout est avide de découvertes ? En avant pour une nouvelle aventure « Repères et mouvements » ! 
      Chaque semaine, une facette différente de la psychomotricité sera mise à l’honneur avec un programme taillé sur mesure pour s’amuser comme des fous !
    lieu: Brabant et Bruxelles
    age: 2-5 ans
  - name: Padel Initiation
    titre_overlay: Padel Initiation
    img: "/assets/images/padelinitiation.png"
    bouton: Plus d'info
    nouveau: oui
    infos: ''
    description: |-
      Ce cours s’adresse aux enfants souhaitant apprendre les fondamentaux du padel dans un cadre dynamique et motivant.
      À travers des ateliers techniques, tactiques et des situations de jeu, les jeunes joueurs développent leurs premières compétences;
      placement, coup droit, revers, service et jeu en équipe.
    lieu: Brabant
    age: 7-14 ans
  - name: Krump Dance
    titre_overlay: Krump Dance
    img: "/assets/images/krump-dance.png"
    bouton: Plus d'info
    nouveau: oui
    infos: ''
    description: "
       Le Krump est un style de danse urbain puissant qui mélange ressenti intérieur, humeur du moment et mouvements inspirés du hip-hop.
       Cette danse expressive permet de transformer ses émotions en mouvement et d’exprimer pleinement sa personnalité.
       Aucun prérequis n’est nécessaire, viens simplement comme tu es et laisse ton corps parler !
                 "
    lieu: Brabant
    age: 8-16 ans
  - name: Cré’Art
    titre_overlay: Cré’Art
    img: "/assets/images/cré-art.png"
    bouton: Plus d'infos
    nouveau: oui
    infos: Stage en partenariat avec l'Euro Space Center
    description: |-
      Votre enfant déborde d’imagination ? Vous aimeriez qu’il développe son esprit créatif tout en s’amusant ? Cette activité est faite pour lui ! 
    lieu: Brabant
    age: 8-14 ans
